<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業版媒體播放</title>
    <style>
        :root { 
            --primary: #6c5ce7; 
            --primary-light: #a29bfe;
            --bg: #0f0f1b; 
            --card: rgba(255, 255, 255, 0.05); 
            --text: #f0f0f0; 
            --danger: #ff7675; 
            --success: #00b894; /* 定義綠色 */
        }

        body { 
            font-family: -apple-system, "Noto Sans TC", sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* 上傳列 */
        .upload-bar { 
            width: 100%; padding: 15px; 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            text-align: center; 
        }

        .file-label { 
            background: linear-gradient(135deg, #6c5ce7, #a29bfe); 
            color: white; padding: 10px 28px; border-radius: 50px; 
            cursor: pointer; font-size: 14px; font-weight: bold; 
            display: inline-block; transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2);
        }
        .file-label:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4); }

        .main-viewer { 
            width: 100%; max-width: 900px; background: #000; 
            aspect-ratio: 16/9; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; 
            margin-top: 10px; border-radius: 8px;
        }
        #displayImg { width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; }

        /* 進度條 */
        .progress-container { width: 90%; max-width: 900px; padding: 15px 0 5px; display: flex; flex-direction: column; gap: 5px; }
        #seekBar { 
            width: 100%; height: 6px; -webkit-appearance: none; 
            background: #2d2d3d; border-radius: 3px; outline: none; cursor: pointer;
        }
        #seekBar::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 14px; height: 14px; 
            background: var(--text); border-radius: 50%; box-shadow: 0 0 10px var(--primary);
        }

        .time-info { display: flex; justify-content: space-between; font-size: 12px; color: #888; font-family: monospace; }

        .controls { 
            width: 100%; max-width: 900px; background: var(--card); 
            padding: 20px 0; display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; justify-items: center; border-radius: 12px; margin: 10px 0;
        }
        button { 
            width: 85%; padding: 12px 5px; border: none; border-radius: 12px; 
            font-size: 14px; font-weight: bold; cursor: pointer; color: white; 
            background: rgba(255,255,255,0.08); transition: 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.15); }

        /* 修改播放鍵顏色為 success (綠色) */
        .btn-play { background: var(--success); grid-column: span 2; width: 93%; font-size: 16px; }
        .btn-play:hover { background: #00a383; }

        /* 媒體庫區域 */
        .library-container { width: 100%; max-width: 900px; padding: 15px; box-sizing: border-box; }
        .section-title { font-size: 14px; margin: 20px 0 12px; color: var(--primary-light); font-weight: bold; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        .scroll-x { display: flex; gap: 15px; overflow-x: auto; padding: 10px 5px; scroll-behavior: smooth; }
        
        .thumb-wrapper { 
            position: relative; min-width: 110px; max-width: 110px; height: 110px; 
            flex-shrink: 0; transition: transform 0.2s;
        }
        .thumb-wrapper:hover { transform: translateY(-3px); }
        .thumb-item { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 2px solid transparent; cursor: pointer; }
        .thumb-item.active { border-color: var(--primary); box-shadow: 0 0 12px var(--primary); }
        
        .del-btn, .edit-btn { 
            position: absolute; background: rgba(0,0,0,0.6); color: white; 
            border-radius: 50%; width: 24px; height: 24px; font-size: 12px; 
            line-height: 24px; text-align: center; border: 1px solid rgba(255,255,255,0.2); 
            cursor: pointer; z-index: 2; opacity: 0.8; transition: 0.2s;
        }
        .del-btn { top: 5px; right: 5px; background: var(--danger); }
        .edit-btn { bottom: 5px; right: 5px; background: var(--primary); }
        .thumb-wrapper:hover .del-btn, .thumb-wrapper:hover .edit-btn { opacity: 1; }

        .audio-list { display: flex; flex-direction: column; gap: 10px; }
        .audio-item-wrapper { 
            display: flex; align-items: center; background: var(--card); 
            border-radius: 12px; padding: 12px 18px; transition: 0.2s;
        }
        .audio-item-wrapper:hover { background: rgba(255,255,255,0.1); }
        .audio-item-wrapper.active { background: var(--primary); }
        .audio-name { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
        .audio-edit { margin: 0 12px; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .audio-edit:hover { opacity: 1; }
        .audio-del { cursor: pointer; color: var(--danger); font-size: 18px; }

        /* 放大視窗 */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow: auto; }
        .modal-content { display: block; margin: auto; transition: width 0.15s ease-out; padding: 40px 20px; }
        .zoom-controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 10px 25px; border-radius: 40px; z-index: 2001; border: 1px solid rgba(255,255,255,0.1); align-items: center; }
        .close-modal { position: fixed; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; z-index: 2002; }
    </style>
</head>
<body>

<div class="upload-bar">
    <label class="file-label" for="fileInput">📂 匯入媒體</label>
    <input type="file" id="fileInput" multiple accept="image/*,audio/*,video/*,.m4a,.mp4" style="display:none">
    <input type="text" id="searchInput" placeholder="搜尋檔案名稱..." 
           style="margin-top: 12px; width: 85%; max-width: 500px; padding: 10px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none;">
</div>

<div class="main-viewer">
    <img id="displayImg" onclick="openZoom(this.src)" src="data:image/svg+xml,<svg xmlns='http://www.w3.org' viewBox='0 0 100 100'><text x='50' y='50' text-anchor='middle' fill='%23333' font-size='6'>尚未載入內容</text></svg>">
</div>

<div class="progress-container">
    <input type="range" id="seekBar" value="0" step="0.1">
    <div class="time-info">
        <span id="currTime">00:00</span>
        <span id="durTime">00:00</span>
    </div>
</div>

<div class="controls">
    <button class="btn-play" onclick="togglePlay()" id="playBtn">▶ 播放</button>
    <button id="loopBtn" onclick="toggleLoop()">🔁 循環: 關</button>
    <div style="grid-column: span 3; display: flex; gap: 8px; width: 93%; margin-top: 5px;">
        <button onclick="setSpeed(0.5)">0.5x</button>
        <button onclick="setSpeed(1.0)" id="speedNormal" style="background: var(--primary)">1.0x</button>
        <button onclick="setSpeed(1.5)">1.5x</button>
        <button onclick="setSpeed(2.0)">2.0x</button>
    </div>
</div>

<div class="library-container">
    <div class="section-title">圖片庫</div>
    <div id="imgLib" class="scroll-x"></div>
    <div class="section-title">音樂庫</div>
    <div id="audioLib" class="audio-list"></div>
</div>

<div id="zoomModal" class="modal" onclick="if(event.target == this) closeZoom()">
    <span class="close-modal" onclick="closeZoom()">&times;</span>
    <img id="zoomedImg" class="modal-content">
    <div class="zoom-controls" onclick="event.stopPropagation()">
        <button onclick="changeZoom(-0.3)" style="background:none; width:auto; padding:0 10px; color:white; border:none; cursor:pointer;">➖</button>
        <input type="range" id="zoomSlider" min="1" max="6" step="0.1" value="1" oninput="applyZoom()" style="width:120px;">
        <button onclick="changeZoom(0.3)" style="background:none; width:auto; padding:0 10px; color:white; border:none; cursor:pointer;">➕</button>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script>
    const dbName = "FinalPlayerDB";
    let db;

    // 資料庫初始化
    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("files")) db.createObjectStore("files", { keyPath: "name" });
    };
    request.onsuccess = (e) => {
        db = e.target.result;
        loadFilesFromDB();
    };

    const fileInput = document.getElementById('fileInput');
    const displayImg = document.getElementById('displayImg');
    const audioPlayer = document.getElementById('audioPlayer');
    const seekBar = document.getElementById('seekBar');
    const playBtn = document.getElementById('playBtn');

    // 上傳邏輯
    fileInput.addEventListener('change', async (e) => {
        for (const file of e.target.files) {
            const transaction = db.transaction(["files"], "readwrite");
            transaction.objectStore("files").put({ name: file.name, type: file.type, data: file });
            const url = URL.createObjectURL(file);
            file.type.startsWith('image/') ? renderImg(file.name, url) : renderAudio(file.name, url);
        }
        fileInput.value = '';
    });

    function loadFilesFromDB() {
        const store = db.transaction(["files"], "readonly").objectStore("files");
        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const url = URL.createObjectURL(cursor.value.data);
                cursor.value.type.startsWith('image/') ? renderImg(cursor.value.name, url) : renderAudio(cursor.value.name, url);
                cursor.continue();
            }
        };
    }

    // 渲染函數
    function renderImg(name, url) {
        if (document.querySelector(`[data-id-img="${name}"]`)) return;
        const wrap = document.createElement('div');
        wrap.className = 'thumb-wrapper';
        wrap.dataset.idImg = name;
        wrap.innerHTML = `<img src="${url}" class="thumb-item"><div class="del-btn">×</div><div class="edit-btn">✎</div>`;
        
        wrap.querySelector('img').onclick = () => {
            displayImg.src = url;
            document.querySelectorAll('.thumb-item').forEach(i => i.classList.remove('active'));
            wrap.querySelector('img').classList.add('active');
            
            const base = name.split('.').slice(0, -1).join('.');
            const audioItems = Array.from(document.querySelectorAll('.audio-item-wrapper'));
            const match = audioItems.find(i => i.dataset.idAudio.split('.').slice(0, -1).join('.') === base);
            if (match) match.querySelector('.audio-name').click();
        };

        wrap.querySelector('.edit-btn').onclick = (e) => { e.stopPropagation(); renameFile(name); };
        wrap.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); deleteFile(name); wrap.remove(); };
        document.getElementById('imgLib').appendChild(wrap);
    }

    function renderAudio(name, url) {
        if (document.querySelector(`[data-id-audio="${name}"]`)) return;
        const wrap = document.createElement('div');
        wrap.className = 'audio-item-wrapper';
        wrap.dataset.idAudio = name;
        wrap.innerHTML = `<div class="audio-name">🎵 ${name}</div><div class="audio-edit">✎</div><div class="audio-del">×</div>`;
        
        wrap.querySelector('.audio-name').onclick = () => {
            audioPlayer.src = url;
            audioPlayer.play();
            document.querySelectorAll('.audio-item-wrapper').forEach(i => i.classList.remove('active'));
            wrap.classList.add('active');
        };

        wrap.querySelector('.audio-edit').onclick = (e) => { e.stopPropagation(); renameFile(name); };
        wrap.querySelector('.audio-del').onclick = (e) => { e.stopPropagation(); deleteFile(name); wrap.remove(); };
        document.getElementById('audioLib').appendChild(wrap);
    }

    // 檔案操作與播放邏輯
    async function renameFile(oldName) {
    const newName = prompt("請輸入新的檔案名稱：", oldName);
    if (!newName || newName === oldName) return;

    const transaction = db.transaction(["files"], "readwrite");
    const store = transaction.objectStore("files");
    
    // 1. 先獲取舊資料
    const getRequest = store.get(oldName);
    getRequest.onsuccess = () => {
        const record = getRequest.result;
        if (record) {
            // 2. 刪除舊紀錄
            store.delete(oldName);
            // 3. 更新名稱並存入新紀錄
            record.name = newName;
            store.put(record);
            
            // 4. 重要：等待交易完成後再重新整理頁面，確保新 URL 生成
            transaction.oncomplete = () => {
                location.reload(); 
            };
        }
    };
}

    function deleteFile(name) {
        db.transaction(["files"], "readwrite").objectStore("files").delete(name);
    }

    function togglePlay() {
        if (!audioPlayer.src) return;
        audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause();
    }

    function toggleLoop() {
        audioPlayer.loop = !audioPlayer.loop;
        document.getElementById('loopBtn').innerText = audioPlayer.loop ? "🔁 循環: 開" : "🔁 循環: 關";
    }

    function setSpeed(s) {
        audioPlayer.playbackRate = s;
        document.querySelectorAll('.controls button').forEach(b => {
            if(b.innerText.includes('x')) b.style.background = 'rgba(255,255,255,0.08)';
        });
        event.target.style.background = 'var(--primary)';
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.thumb-wrapper').forEach(el => el.style.display = el.dataset.idImg.toLowerCase().includes(term) ? 'block' : 'none');
        document.querySelectorAll('.audio-item-wrapper').forEach(el => el.style.display = el.dataset.idAudio.toLowerCase().includes(term) ? 'flex' : 'none');
    });

    audioPlayer.ontimeupdate = () => {
        if (!isNaN(audioPlayer.duration)) {
            seekBar.value = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            document.getElementById('currTime').innerText = formatTime(audioPlayer.currentTime);
            document.getElementById('durTime').innerText = formatTime(audioPlayer.duration);
        }
    };
    seekBar.oninput = () => { if (audioPlayer.duration) audioPlayer.currentTime = (seekBar.value / 100) * audioPlayer.duration; };
    
    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m < 10 ? '0' : ''}${m}:${sec < 10 ? '0' : ''}${sec}`;
    }
    audioPlayer.onplay = () => playBtn.innerText = "⏸ 暫停";
    audioPlayer.onpause = () => playBtn.innerText = "▶ 播放";

    // 縮放功能
    function openZoom(src) {
        if (src.includes('data:image/svg')) return;
        const modal = document.getElementById('zoomModal');
        document.getElementById('zoomedImg').src = src;
        modal.style.display = 'block';
        document.getElementById('zoomSlider').value = 1;
        applyZoom();
    }
    function closeZoom() { document.getElementById('zoomModal').style.display = 'none'; }
    function applyZoom() {
        const val = document.getElementById('zoomSlider').value;
        document.getElementById('zoomedImg').style.width = (val * 80) + '%';
    }
    function changeZoom(delta) {
        const s = document.getElementById('zoomSlider');
        s.value = parseFloat(s.value) + delta;
        applyZoom();
    }
</script>
</body>
</html>
